title: "TRQP Conformance Suite"
description: "Executable protocol conformance tests, profiles, fixtures, and evidence generation for TRQP implementations."
url: "https://sankarshanmukhopadhyay.github.io"
baseurl: "/trqp-conformance-suite"
theme: just-the-docs
color_scheme: nil
search_enabled: true
heading_anchors: true
permalink: pretty

plugins:
  - jekyll-seo-tag

aux_links:
  "View repository":
    - "https://github.com/sankarshanmukhopadhyay/trqp-conformance-suite"
aux_links_new_tab: true

callouts:
  note:
    title: Note
    color: blue
  warning:
    title: Warning
    color: yellow

exclude:
  - vendor
  - .bundle
  - Gemfile.lock
  - node_modules
  - external
  - "**/__pycache__/**"
  - "**/*.pyc"

include:
  - docs
  - schemas
  - profiles
  - examples
  - artifacts
  - releases
